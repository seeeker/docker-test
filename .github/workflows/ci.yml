name: CI

# WHICH events trigger this workflow.
on:
  push:
    branches: [main]      # changes landing on main
  pull_request:           # changes proposed against any branch

jobs:
  # --- Job 1: run the test suite -------------------------------------------
  test:
    runs-on: ubuntu-latest          # a fresh, throwaway x86_64 VM
    steps:
      - name: Check out the code
        uses: actions/checkout@v4    # pulls this repo onto the runner

      - name: Set up Python 3.11     # match the runtime in the Dockerfile
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install runtime + dev dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt

      - name: Run the test suite
        run: pytest -v

  # --- Job 2: build multi-arch and publish to GHCR (only if tests passed) ---
  build-and-push:
    needs: test                      # gate: don't build a known-broken app
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write                # allow this job to push to GHCR
    steps:
      - name: Check out the code
        uses: actions/checkout@v4

      # QEMU lets the amd64 runner execute arm64 binaries during the build.
      - name: Set up QEMU (cross-arch emulation)
        uses: docker/setup-qemu-action@v3

      # buildx is the extended builder that produces a multi-arch manifest list.
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Authenticate to GHCR using the automatic, per-run GITHUB_TOKEN.
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Build for BOTH architectures. Push only when this is NOT a pull request
      # (i.e. only real pushes to main publish; PRs just verify the build works).
      - name: Build and push multi-arch image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ghcr.io/seeeker/docker-test:latest
